<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BI ICI-SAN · São Paulo</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--bg:#0d1320;--panel:#141d2e;--panel2:#1a2538;--ink:#e8eef6;--mut:#8294b0;--line:#243149;
--acc:#5b9bd5;--acchi:#7db8ec;
--c1:#d73027;--c2:#fdae61;--c3:#fee08b;--c4:#a6d96a;--c5:#1a9850}
*{box-sizing:border-box;margin:0;padding:0}
body{font:14px/1.5 'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden}
.app{display:grid;grid-template-columns:392px 1fr;height:100vh}
.side{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
.head{padding:18px 22px 12px;border-bottom:1px solid var(--line)}
.kick{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--acc);font-weight:600}
h1{font-size:20px;font-weight:700;margin:5px 0 3px;letter-spacing:-.02em}
.sub{font-size:11.5px;color:var(--mut);line-height:1.45}
.tabs{display:flex;gap:5px;padding:11px 14px 0;flex-wrap:wrap}
.tab{flex:1;min-width:74px;text-align:center;padding:8px 4px;font-size:11.5px;font-weight:600;border:1px solid var(--line);border-radius:8px 8px 0 0;cursor:pointer;color:var(--mut);background:var(--bg);transition:.12s}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--ink);background:var(--panel);border-bottom-color:var(--panel);box-shadow:inset 0 2px 0 var(--acc)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.stat{background:var(--panel);padding:10px 11px}.stat .v{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}.stat .l{font-size:9.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
.srch{padding:10px 16px;border-bottom:1px solid var(--line)}
.srch input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);padding:9px 12px;border-radius:8px;font-size:13px;outline:none}
.srch input:focus{border-color:var(--acc)}
.list{flex:1;overflow-y:auto}
.row{display:grid;grid-template-columns:32px 1fr auto;gap:10px;align-items:center;padding:9px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
.row:hover{background:var(--panel2)}.row.sel{background:#1f2d44}
.rk{font-size:12px;color:var(--mut);font-variant-numeric:tabular-nums;text-align:right;font-weight:600}
.nm{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fx{font-size:10px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc{font-weight:700;font-variant-numeric:tabular-nums;font-size:13.5px;padding:2px 8px;border-radius:6px;color:#08120c;min-width:54px;text-align:center}
.scq{font-weight:700;font-size:12px;padding:3px 9px;border-radius:6px;color:#fff}
.main{position:relative}#map{position:absolute;inset:0;background:var(--bg)}
.leaflet-container{background:var(--bg)}
.panel{position:absolute;right:14px;top:14px;width:312px;max-height:calc(100vh - 28px);overflow-y:auto;background:rgba(20,29,46,.97);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:12px;padding:16px 17px;box-shadow:0 10px 40px rgba(0,0,0,.5)}
.panel.hide{display:none}
.panel h3{font-size:16px;font-weight:700;margin-bottom:2px}
.pr{font-size:11px;color:var(--mut);margin-bottom:12px}
.bar{margin:7px 0}
.bl{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}.bl span:last-child{font-variant-numeric:tabular-nums;color:var(--acchi);font-weight:600}
.bt{height:6px;background:var(--bg);border-radius:4px;overflow:hidden}.bf{height:100%;background:linear-gradient(90deg,var(--acc),var(--acchi));border-radius:4px}
.tot{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:11px;border-top:1px solid var(--line)}
.cls{font-size:12px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.04em}
.tv{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}
.kv{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px solid var(--line)}.kv span:last-child{font-weight:600;font-variant-numeric:tabular-nums}
.pnote{font-size:10.5px;color:var(--mut);line-height:1.5;margin-top:11px}
.legend{position:absolute;left:14px;bottom:14px;background:rgba(20,29,46,.96);border:1px solid var(--line);border-radius:10px;padding:11px 14px;font-size:11px}
.legrow{display:flex;align-items:center;gap:8px;margin:3px 0}
.legbox{width:16px;height:16px;border-radius:3px;flex-shrink:0}
.qbadge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;color:#fff}
/* methodology */
.meth{flex:1;overflow-y:auto;padding:18px 22px 40px}
.meth h2{font-size:15px;color:var(--acchi);margin:20px 0 7px;font-weight:700}
.meth h2:first-child{margin-top:2px}
.meth p{font-size:12.5px;color:#cdd8e8;margin-bottom:9px;line-height:1.6}
.meth .f{font-family:ui-monospace,Consolas,monospace;font-size:11.5px;color:#bfe0ff;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:8px 11px;margin:7px 0;white-space:pre-wrap;line-height:1.5}
.meth ul{margin:4px 0 10px 4px;list-style:none}
.meth li{font-size:12px;color:#cdd8e8;padding:3px 0 3px 16px;position:relative;line-height:1.55}
.meth li:before{content:"–";position:absolute;left:0;color:var(--acc)}
.meth .warn{background:rgba(215,48,39,.1);border:1px solid rgba(215,48,39,.35);border-radius:8px;padding:10px 12px;font-size:11.5px;color:#f0c8c4;margin:9px 0;line-height:1.55}
.meth b{color:var(--ink)}
.meth .mtag{font-family:ui-monospace,monospace;font-size:11px;color:var(--acc)}
.mtable{width:100%;border-collapse:collapse;margin:7px 0 11px}
.mtable th,.mtable td{border:1px solid var(--line);padding:5px 8px;font-size:11px;text-align:left;vertical-align:top}
.mtable th{background:var(--panel2);color:var(--acchi);font-weight:700}
.mtable td:first-child{font-weight:600;white-space:nowrap}
</style></head><body>

const TBLM=D.TBLM, TBLD=D.TBLD, MUNI=D.MUNI, DRADS=D.DRADS;
const byNomeM={}; TBLM.forEach(r=>byNomeM[r.nome]=r);
const byNomeD={}; TBLD.forEach(r=>byNomeD[r.drads]=r);
const blocks=[['4.1 Órgão gestor'],['4.2 Lei de SAN'],['4.3 Conselho/Câmara'],['Plano de SAN'],['4.4 Orçamento'],['4.5 Ações']];

function rampICI(v){return v>=.6?'#1a9850':v>=.4?'#66bd63':v>=.3?'#a6d96a':v>=.2?'#fee08b':v>=.1?'#fdae61':'#d73027'}
function rampIRD(v){return v>=6?'#08306b':v>=3?'#2171b5':v>=2?'#4292c6':v>=1.5?'#6baed6':v>=1?'#9ecae1':'#deebf7'}
const QCOL={4:'#c0392b',3:'#e67e22',2:'#f1c40f',1:'#27ae60'};
const QLBL={4:'Crítico · baixa inst. + baixa disp.',3:'Disp. é o gargalo · alta inst. + baixa disp.',2:'Inst. é o gargalo · baixa inst. + alta disp.',1:'Favorável · alta inst. + alta disp.'};

let map=null;
try{ map=L.map('map',{zoomControl:true,attributionControl:false}).setView([-22.5,-48.6],7); }
catch(e){ const el=document.getElementById('map'); if(el)el.innerHTML='<div style="padding:24px;color:#8294b0;font-size:13px">Mapa indisponível (Leaflet não carregou). Lista e metodologia seguem funcionando.</div>'; }
let layer=null, mlayer=null, selLayer=null, mode='mun';
const KEY={mun:'nome',icri:'nome',ipsan:'nome',drads:'drads'};
function rampIP(v){return v>=.6?'#1a9850':v>=.5?'#66bd63':v>=.4?'#a6d96a':v>=.3?'#fee08b':v>=.2?'#fdae61':'#d73027'}

function styleF(f){const p=f.properties;
 if(mode==='drads')return{fillColor:rampIRD(byNomeD[p.drads].ird),weight:1.4,color:'#0a0e14',fillOpacity:.86};
 if(mode==='icri')return{fillColor:QCOL[p.risco],weight:.4,color:'#0d1320',fillOpacity:.85};
 if(mode==='ipsan')return{fillColor:rampIP(p.ipsanv),weight:.4,color:'#0d1320',fillOpacity:.85};
 return{fillColor:rampICI(p.ici),weight:.4,color:'#0d1320',fillOpacity:.85};}

function draw(){
 if(!map)return;
 if(layer)map.removeLayer(layer);
 const data=mode==='drads'?DRADS:MUNI;
 const kf=KEY[mode];
 layer=L.geoJSON(data,{style:styleF,
  onEachFeature:(f,l)=>{
   l.on('click',()=>select(f.properties[kf],l));
   l.on('mouseover',()=>{if(l!==selLayer)l.setStyle({weight:2,color:'#fff'})});
   l.on('mouseout',()=>{if(l!==selLayer)layer.resetStyle(l)});
  }}).addTo(map);
 if(mlayer){try{map.removeLayer(mlayer)}catch(e){} mlayer=null}
 if(mode==='ipsan'&&map){
  const ms=[];
  MUNI.features.forEach(f=>{const p=f.properties;if(!p.ctr)return;
   if(p.bp)ms.push(L.circleMarker([p.ctr[1],p.ctr[0]-0.03],{radius:4,color:'#fff',weight:1,fillColor:'#1e6ff5',fillOpacity:1}));
   if(p.sa)ms.push(L.circleMarker([p.ctr[1],p.ctr[0]+0.03],{radius:4,color:'#fff',weight:1,fillColor:'#3d3d3d',fillOpacity:1}));});
  mlayer=L.layerGroup(ms).addTo(map);
 }
 try{map.fitBounds(layer.getBounds(),{padding:[12,12]})}catch(e){}
}

function select(name,l){
 const isM=mode!=='drads';
 const r=isM?byNomeM[name]:byNomeD[name];
 if(!r)return;
 if(selLayer)layer.resetStyle(selLayer);
 if(l){selLayer=l;l.setStyle({weight:2.6,color:'#fff'});l.bringToFront()}
 const p=document.getElementById('panel');p.classList.remove('hide');
 let h='';
 if(mode==='mun'){
  h=`<h3>${r.nome}</h3><div class="pr">${r.rank}º de 645 · ${r.drads} · ${r.faixa}</div>`;
  blocks.forEach((b,i)=>{const v=r.b[i];h+=`<div class="bar"><div class="bl"><span>${b[0]}</span><span>${v.toFixed(3)}</span></div><div class="bt"><div class="bf" style="width:${(v*100).toFixed(0)}%"></div></div></div>`});
  h+=`<div class="tot"><span class="cls">ICI-SAN</span><span class="tv" style="color:${rampICI(r.ici)}">${r.ici.toFixed(4)}</span></div>`;
  h+=`<div class="pnote">Média simples dos seis blocos (peso 1/6 cada). Veja a aba <b>Metodologia</b> para a fórmula de cada componente.</div>`;
 } else if(mode==='drads'){
  h=`<h3>${r.drads}</h3><div class="pr">${r.rank}º de 26 DRADS · ${r.n} municípios</div>`;
  h+=`<div class="kv"><span>IRD ponderado</span><span style="color:${rampIRD(r.ird)}">${r.ird.toFixed(4)}</span></div>`;
  h+=`<div class="kv"><span>ICI-SAN médio</span><span>${r.icimed.toFixed(4)}</span></div>`;
  h+=`<div class="kv"><span>Amplitude</span><span>${r.imin.toFixed(3)} – ${r.imax.toFixed(3)}</span></div>`;
  h+=`<div class="pnote">O IRD pondera o ICI-SAN por porte populacional (pesos 1–7) e <b>não é limitado a [0,1]</b>. Use o ICI-SAN médio para comparação direta. Fórmula na aba Metodologia.</div>`;
 } else if(mode==='ipsan'){
  h=`<h3>${r.nome}</h3><div class="pr">${r.rankv}º de 645 no IPSAN-V · ${r.drads}</div>`;
  h+=`<div class="kv"><span>Estrutura (E8, 8 comp.)</span><span>${(((r.b.reduce((a,x)=>a+x,0))+r.bp+r.sa)/8).toFixed(4)}</span></div>`;
  h+=`<div class="kv"><span>Vulnerabilidade (V, IPVS)</span><span>${r.v.toFixed(4)}</span></div>`;
  h+=`<div class="kv"><span>Capacidade Bom Prato</span><span style="color:${r.bp>0?'#4d94ff':'#8294b0'}">${r.bp>0?r.bp.toFixed(2)+' (meta 300 ref./100k)':'—'}</span></div>`;
  h+=`<div class="kv"><span>SuperAção SP</span><span style="color:${r.sa?'#c8d2e0':'#8294b0'}">${r.sa?'Sim':'Não'}</span></div>`;
  h+=`<div class="tot"><span class="cls">IPSAN-V</span><span class="tv" style="color:${rampIP(r.ipsanv)}">${r.ipsanv.toFixed(4)}</span></div>`;
  h+=`<div class="pnote">IPSAN-V = ½·E8 + ½·(1−V). Presença de programas em <b>programas.csv</b> (validar com a lista oficial). Fórmulas na aba Metodologia.</div>`;
 } else {
  h=`<h3>${r.nome}</h3><div class="pr">${r.drads} · ${r.faixa}</div>`;
  h+=`<div style="margin:8px 0"><span class="qbadge" style="background:${QCOL[r.risco]}">RISCO ${r.risco}</span></div>`;
  h+=`<div class="kv"><span>Quadrante</span><span>${r.quad}</span></div>`;
  h+=`<div class="kv"><span>ICI-SAN</span><span style="color:${rampICI(r.ici)}">${r.ici.toFixed(4)}</span></div>`;
  h+=`<div class="kv"><span>Disp. (quartil proxy)</span><span>${r.quartil||'—'}</span></div>`;
  h+=`<div class="pnote">${QLBL[r.risco]}.<br><br><b>Preliminar:</b> o eixo de disponibilidade usa proxy por porte populacional, não os quartis reais do FEALQ/MDS.</div>`;
 }
 p.innerHTML=h;
 // sync list selection
 document.querySelectorAll('.row').forEach(x=>x.classList.toggle('sel',x.dataset.n===name));
}

function colScore(r){
 if(mode==='drads')return `<div class="sc" style="background:${rampIRD(r.ird)}">${r.ird.toFixed(2)}</div>`;
 if(mode==='icri')return `<div class="scq" style="background:${QCOL[r.risco]}">R${r.risco}</div>`;
 if(mode==='ipsan')return `<div class="sc" style="background:${rampIP(r.ipsanv)}">${r.ipsanv.toFixed(3)}</div>`;
 return `<div class="sc" style="background:${rampICI(r.ici)}">${r.ici.toFixed(3)}</div>`;
}
function renderList(filter){
 const lst=document.getElementById('list');lst.innerHTML='';
 const tbl=mode==='drads'?TBLD:(mode==='icri'?TBLM.slice().sort((a,b)=>a.risco!==b.risco?b.risco-a.risco:(a.rank-b.rank)):(mode==='ipsan'?TBLM.slice().sort((a,b)=>b.ipsanv-a.ipsanv):TBLM));
 const kf=mode==='drads'?'drads':'nome';
 tbl.filter(r=>{const nm=r[kf];return !filter||nm.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(filter)}).forEach(r=>{
  const nm=r[kf];
  const rk=mode==='drads'?r.rank:(mode==='icri'?'':(mode==='ipsan'?r.rankv:r.rank));
  const sub=mode==='drads'?`${r.n} mun. · IRD ${r.ird.toFixed(2)}`:(mode==='icri'?`${r.drads} · ${QLBL[r.risco].split(' · ')[0]}`:(mode==='ipsan'?`${r.drads}${r.bp?' · Bom Prato':''}${r.sa?' · SuperAção':''}`:`${r.drads} · ${r.faixa}`));
  const d=document.createElement('div');d.className='row';d.dataset.n=nm;
  d.innerHTML=`<div class="rk">${rk}</div><div><div class="nm">${nm}</div><div class="fx">${sub}</div></div>${colScore(r)}`;
  d.onclick=()=>{let found=false;if(layer){layer.eachLayer(l=>{if(l.feature.properties[KEY[mode]]===nm){select(nm,l);try{map.fitBounds(l.getBounds(),{maxZoom:mode==='drads'?9:10,padding:[40,40]})}catch(e){}found=true}})}if(!found)select(nm,null)};
  lst.appendChild(d)});
}

const METH="\n<h2>O que estes índices medem — e o que não medem</h2>\n<p>A MUNIC capta a <b>existência e a configuração das estruturas institucionais</b> municipais de SAN. Medir um conselho ou uma lei é medir a <b>capacidade de governar a política</b> — não o estado de segurança alimentar da população. Por isso o índice chama-se <b>capacidade institucional</b> (um meio), não segurança alimentar (um fim, medido por EBIA, PNAD ou POF).</p>\n<p>A construção segue o <b>Handbook OCDE/JRC</b> (Nardo et al., 2008): marco teórico, seleção de variáveis, tratamento de ausentes, normalização, ponderação e agregação. Campos \"—\" (não aplicável) recebem <b>zero</b>, penalizando a ausência de estrutura.</p>\n\n<h2>1 · ICI-SAN municipal</h2>\n<p>Seis blocos do bloco SAN da MUNIC 2023, cada um em [0,1]; o ICI-SAN é a <b>média simples</b> (peso 1/6).</p>\n<table class=\"mtable\">\n<tr><th>Bloco</th><th>Regra de pontuação</th></tr>\n<tr><td>4.1 Órgão</td><td><span class=\"mtag\">MSAN01 + MSAN021–026</span> · 0,5·existe + 0,5·(vínculos setoriais/6)</td></tr>\n<tr><td>4.2 Lei</td><td><span class=\"mtag\">MSAN04</span> · possui=1 · em trâmite=0,5 · não=0</td></tr>\n<tr><td>4.3 Conselho</td><td>composto: 0,2·existe + 0,8·média(ativo, caráter, reuniões, capacitação, infraestrutura)</td></tr>\n<tr><td>Plano</td><td><span class=\"mtag\">MSAN15</span> · possui=1 · não=0</td></tr>\n<tr><td>4.4 Orçamento</td><td>dotação específica para SAN · sim=1 · não=0</td></tr>\n<tr><td>4.5 Ações</td><td>proporção de ações implementadas sobre o rol pesquisado (~30 itens)</td></tr>\n</table>\n<div class=\"f\">ICI-SAN = média(4.1, 4.2, 4.3, Plano, 4.4, 4.5)</div>\n<p>Conferência (Diadema): (0,500 + 1 + 0,832 + 1 + 1 + 0,567)/6 = <b>0,8164</b>.</p>\n<p>Distribuição estadual fortemente assimétrica à direita: média <b>0,254</b>, mediana <b>0,214</b>, máximo <b>0,816</b> (Diadema). A fragilidade institucional é a regra, não a exceção.</p>\n\n<h2>2 · Agregação regional (DRADS)</h2>\n<p>Os 645 municípios são agregados às 26 DRADS (Resolução SEDS 09/2026, pareamento 645/645). A fórmula pondera o ICI-SAN por porte populacional, atribuindo pesos crescentes de 1 a 7 às sete faixas do IBGE (tese: Queiroz, 2024, §6.3.5.5):</p>\n<div class=\"f\">IRD = { [ Σ ( peso_k · Σ ICI-SAN da faixa k ) ] · 2 } / N\n\npeso_k ∈ {1..7} por faixa populacional IBGE;  N = nº de municípios</div>\n<div class=\"warn\"><b>Advertência de escala:</b> o IRD <b>não</b> é limitado a [0,1] — o multiplicador de porte (até 7×) e o fator 2 expandem a escala (Capital chega a 11,24 com um único município de classe 7). Para comparação direta, use o <b>ICI-SAN médio</b>; o IRD serve à priorização do apoio técnico e cofinanciamento.</p>\n\n<h2>3 · ICRI-SAN (co-risco institucional)</h2>\n<p>Matriz 2×2 que cruza <b>capacidade institucional</b> (ICI-SAN, dicotomizado pela mediana 0,214) e <b>disponibilidade de alimentos saudáveis</b>, preservando qual dimensão é o gargalo em vez de fundir tudo num número.</p>\n<table class=\"mtable\">\n<tr><th>Quadrante</th><th>Leitura</th><th>Risco</th><th>Mun.</th></tr>\n<tr><td>Baixa inst. + baixa disp.</td><td>Crítico · prioridade máxima</td><td>4</td><td>283</td></tr>\n<tr><td>Alta inst. + baixa disp.</td><td>Abastecimento é o gargalo</td><td>3</td><td>225</td></tr>\n<tr><td>Baixa inst. + alta disp.</td><td>Institucionalização é o gargalo</td><td>2</td><td>39</td></tr>\n<tr><td>Alta inst. + alta disp.</td><td>Cenário favorável</td><td>1</td><td>98</td></tr>\n</table>\n<div class=\"warn\"><b>Resultado preliminar:</b> o eixo de disponibilidade usa, provisoriamente, um <b>proxy por porte populacional</b>. A classificação real por quartis do FEALQ/MDS (densidade de varejo de alimentos saudáveis) está publicada apenas como mapa, sem tabela acessível. Para definitivar, basta substituir a coluna do proxy pelos quartis reais — nenhuma outra parte do índice muda.</p>\n<h2>4 · IPSAN-V (estrutura × vulnerabilidade)</h2>\n<p>Índice sintético que combina a <b>estrutura de proteção socioalimentar</b> — os seis blocos do ICI-SAN mais a presença dos programas estaduais <b>Bom Prato</b> (fixo/móvel) e <b>SuperAção SP</b>, ambos 0/1 — com a <b>vulnerabilidade social</b> contínua do IPVS 2022 (Seade/Censo 2022).</p>\n<div class=\"f\">E8 = média(6 blocos ICI-SAN, BomPrato, SuperAção)   [peso 1/8]\nV  = Σ share de moradores no grupo g · (g−1)/5 ,  g = 1..6 (IPVS)\nIPSAN-V = ½·E8 + ½·(1−V)</div>\n<p>Extremos por construção: <b>0</b> ⇔ pior estrutura <b>e</b> maior vulnerabilidade; <b>1</b> ⇔ estrutura perfeita <b>e</b> vulnerabilidade zero (agregação aditiva — as formas multiplicativas atingem os extremos com uma condição só e foram descartadas). Resultados: média 0,367; máximo 0,740 (Campinas); mínimo 0,130 (Barra do Chapéu).</p>\n<div class=\"warn\"><b>Validação pendente:</b> a lista de municípios com Bom Prato e SuperAção (programas.csv) foi compilada de fontes oficiais públicas e deve ser confirmada pela SPP, detentora da lista canônica.</div>\n<p style=\"color:#6b7a90;font-size:11px;margin-top:14px\">Fonte: MUNIC/IBGE 2023 (bloco SAN) · DRADS: Resolução SEDS 09/2026 · Ponderação: Queiroz (2024), tese de doutorado, INPE · Disponibilidade: FEALQ/MDS (proxy). Anexo metodológico completo disponível em separado.</p>\n";
function showMeth(on){
 document.getElementById('meth').style.display=on?'block':'none';
 document.getElementById('list').style.display=on?'none':'block';
 document.getElementById('srchbox').style.display=on?'none':'block';
 document.getElementById('statsbar').style.display=on?'none':'block';
 document.getElementById('legend').style.display=on?'none':'block';
 document.getElementById('panel').classList.toggle('hide',on);
 if(on)document.getElementById('meth').innerHTML=METH;
}

function setMode(m){
 mode=m;
 document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.m===m));
 if(m==='meth'){showMeth(true);return}
 showMeth(false);
 selLayer=null;
 document.getElementById('panel').classList.add('hide');
 document.getElementById('q').value='';
 setStats();setLegend();draw();renderList('');
}

document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>setMode(t.dataset.m));
if(TBLM[0].ipsanv==null){const t=document.querySelector('.tab[data-m=\"ipsan\"]');if(t)t.style.display='none';}
document.getElementById('q').addEventListener('input',e=>renderList(e.target.value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim()));
setMode('mun');
</script></body></html>
